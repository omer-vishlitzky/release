workflow:
  as: osac-project-ofcir-caas
  steps:
    cluster_profile: packet-assisted
    allow_best_effort_post_steps: true
    allow_skip_on_success: true
    pre:
      - ref: ofcir-acquire
      - ref: assisted-ofcir-setup
      - chain: assisted-common-pre
      - ref: osac-project-installer
      - ref: osac-project-caas-agent-setup
    test:
      - ref: osac-project-baremetal-test
    post:
      - ref: ofcir-gather
      - ref: ofcir-release
    env:
      CLUSTERTYPE: "assisted_medium_el9"
  documentation: |-
    This workflow executes the common end-to-end osac-test-infra CaaS test suite on a cluster provisioned by running assisted-installer on a packet server with an agent-based bare metal node.
